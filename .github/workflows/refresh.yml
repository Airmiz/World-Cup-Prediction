name: Refresh World Cup live data

# Runs in GitHub's cloud on a timer — your computer does NOT need to be on.
# It pulls results + real goal minutes, refits the model, regenerates the site,
# and commits the changes. Netlify (connected to this repo) auto-publishes.
on:
  schedule:
    - cron: "0 */2 * * *"      # every 2 hours (UTC)
  workflow_dispatch: {}          # manual "Run workflow" button in the Actions tab

permissions:
  contents: write                # allow committing regenerated files

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull results + goal minutes, refit model, regenerate site
        run: bash src/refresh.sh

      - name: Commit & push updates (triggers Netlify deploy)
        run: |
          git config user.name  "wc2026-bot"
          git config user.email "wc2026-bot@users.noreply.github.com"
          git add data/results.csv data/goal_events.json website/
          if git diff --staged --quiet; then
            echo "No changes this run."
          else
            git commit -m "Auto-refresh live data [skip ci] $(date -u +%FT%TZ)"
            git push
          fi
