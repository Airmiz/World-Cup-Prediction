name: Deploy site to GitHub Pages

# Publishes the static website/ folder to GitHub Pages — free, no deploy "credits".
# Runs on every push to main (including the scheduled auto-refresh commits) and can be
# triggered by hand from the Actions tab. One-time setup: repo Settings → Pages →
# Build and deployment → Source = "GitHub Actions". Requires a public repo for free use.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Let only one Pages deploy run at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website
      - id: deployment
        uses: actions/deploy-pages@v4
